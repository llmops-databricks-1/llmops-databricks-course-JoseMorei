# Databricks Asset Bundle configuration for LLMOps Course
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation

bundle:
  name: llmops-course-josem

artifacts:
  default:
    type: whl
    build: uv build
    path: .

variables:
  git_sha:
    description: git_sha
    default: abcd
  branch:
    description: branch
    default: main
  schedule_pause_status:
    description: schedule pause status
    default: PAUSED

include:
  - resources/*.yml

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://dbc-e1714611-3243.cloud.databricks.com
      auth_type: databricks-cli
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.target}/${bundle.name}
