name: Sync from course-code-hub

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/llmops-databricks-1/course-code-hub.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Merge upstream main
        run: git merge upstream/main --no-edit --allow-unrelated-histories

      - name: Push
        run: git push origin main
